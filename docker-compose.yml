services:
  web:
    build:
      context: .
    command: sh -c "python manage.py migrate && daphne config.asgi:application --bind 0.0.0.0 --port 8000"
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - django_data:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
    command: celery -A config worker -l INFO -P threads
    env_file:
      - .env
    volumes:
      - .:/app
      - django_data:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build:
      context: .
    command: celery -A config beat -l INFO
    env_file:
      - .env
    volumes:
      - .:/app
      - django_data:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  django_data: